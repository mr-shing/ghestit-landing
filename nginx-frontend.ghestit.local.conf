server {
    charset utf-8;
    client_max_body_size 128M;

    listen 80; ## listen for ipv4
    #listen [::]:80 default_server ipv6only=on; ## listen for ipv6

    server_name frontend.ghestit.local;
    root        /var/www/ghestit/ghestit-landing/dist;
    index       index.html;

    # SPA: serve real files, fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # long-cache hashed assets
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* /\. {
        deny all;
    }
}
