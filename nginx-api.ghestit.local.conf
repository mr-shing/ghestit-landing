# Local API host for the Ghestit SPA. CORS is handled in the Yii app
# (api\controllers\BaseActiveController), so nginx stays a plain PHP host.
server {
    charset utf-8;
    client_max_body_size 128M;

    listen 80;
    server_name api.ghestit.local;
    root        /var/www/ghestit/api/web/;
    index       index.php;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ ^/assets/.*\.php$ {
        deny all;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~* /\. {
        deny all;
    }
}
